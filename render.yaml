services:
  - type: web
    name: ppr-control
    env: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /tmp/ppr-data
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REQUIRE_POSTGRES
        value: "true"
