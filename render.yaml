services:
  - type: web
    name: ppr-control
    env: node
    plan: starter
    buildCommand: ""
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
    disk:
      name: ppr-control-data
      mountPath: /var/data
      sizeGB: 1
