<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Восстановление ППР</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7fb;color:#172033;font-family:Arial,sans-serif}
    main{width:min(520px,calc(100vw - 32px));background:#fff;border:1px solid #d9e2ef;border-radius:14px;padding:24px;box-shadow:0 12px 32px rgba(23,32,51,.12)}
    h1{margin:0 0 12px;font-size:24px}
    p{line-height:1.5;font-weight:700;color:#52616d}
    a,button{display:inline-block;margin-top:12px;padding:13px 16px;border:0;border-radius:10px;background:#14324a;color:#fff;text-decoration:none;font-weight:900;font-size:16px}
  </style>
</head>
<body>
  <main>
    <h1>Восстановление ППР</h1>
    <p id="status">Очищаю старый кэш приложения на телефоне. Профиль и записи не удаляются.</p>
    <a href="./?v=98&fresh=phone-fix" id="openApp" hidden>Открыть ППР заново</a>
  </main>
  <script>
    (async () => {
      const status = document.getElementById("status");
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
        status.textContent = "Готово. Старый кэш очищен. Откройте ППР заново.";
      } catch (error) {
        status.textContent = "Готово частично. Всё равно откройте ППР заново.";
      }
      document.getElementById("openApp").hidden = false;
    })();
  </script>
</body>
</html>
