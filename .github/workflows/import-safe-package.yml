name: Import safe project package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract project files
        shell: bash
        run: |
          base64 --decode project-safe.zip.b64 > /tmp/project-safe.zip
          unzip -o /tmp/project-safe.zip -d .
          rm -f project-safe.zip.b64
          rm -f .github/workflows/import-safe-package.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update PPR Control working version with PostgreSQL" || exit 0
          git push
